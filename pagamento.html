<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento - Loucos Por Tapioca</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/imask"></script>
</head>
<body>
    <header class="header-carrinho">
        <a href="carrinho.html" class="btn-voltar"><i class="fa-solid fa-chevron-left"></i></a>
        <span class="titulo-voltar">Finalizar</span>
        <div class="info-sacola">
            <span class="texto-sacola">Total</span>
            <span class="valor-sacola" id="valor-total-header">R$ 0,00</span>
        </div>
    </header>

    <main class="container-pagamento">
        <h3 class="titulo-secao"><i class="fa-regular fa-user"></i> Seus Dados</h3>
        <div class="box-input-animado">
            <label>Seu Nome:</label>
            <div class="input-icon"><i class="fa-solid fa-user"></i><input type="text" id="cliente-nome" placeholder="Como podemos te chamar?"></div>
        </div>
        <div class="box-input-animado">
            <label>Seu Telefone / WhatsApp:</label>
            <div class="input-icon"><i class="fa-brands fa-whatsapp"></i><input type="tel" id="cliente-tel" placeholder="(81) 90000-0000"></div>
        </div>

        <div class="divisor"></div>

        <h3 class="titulo-secao"><i class="fa-solid fa-map-location-dot"></i> Entrega ou Retirada?</h3>
        <div class="grupo-opcoes">
            <label class="card-opcao">
                <input type="radio" name="entrega" value="entrega" checked onchange="toggleEndereco()">
                <div class="conteudo-card">
                    <div class="icone-card"><i class="fa-solid fa-motorcycle"></i></div>
                    <div class="texto-card"><strong>Entrega</strong><p>Receber em casa</p></div>
                    <div class="check-icon"><i class="fa-solid fa-circle-check"></i></div>
                </div>
            </label>
            <label class="card-opcao">
                <input type="radio" name="entrega" value="retirada" onchange="toggleEndereco()">
                <div class="conteudo-card">
                    <div class="icone-card"><i class="fa-solid fa-bag-shopping"></i></div>
                    <div class="texto-card"><strong>Retirada</strong><p>Buscar no local</p></div>
                    <div class="check-icon"><i class="fa-solid fa-circle-check"></i></div>
                </div>
            </label>
        </div>

        <div id="box-endereco" style="display:block;">
            <div class="box-input-animado">
                <label>Rua / Avenida:</label>
                <div class="input-icon"><i class="fa-solid fa-road"></i><input type="text" id="end-rua" placeholder="Nome da rua"></div>
            </div>
            <div class="row-inputs">
                <div class="box-input-animado" style="flex:1;">
                    <label>Número:</label>
                    <div class="input-icon"><i class="fa-solid fa-hashtag"></i><input type="text" id="end-num" placeholder="Nº"></div>
                </div>
                <div class="box-input-animado" style="flex:2;">
                    <label>Bairro:</label>
                    <div class="input-icon" style="position:relative;">
                        <i class="fa-solid fa-map-pin"></i>
                        <select id="end-bairro" onchange="calcularTotalComTaxa()" style="width:100%; padding:15px 15px 15px 45px; border:1px solid #ddd; border-radius:10px; background:#fafafa; outline:none;">
                            <option value="">Selecione o Bairro...</option>
                            <option value="0">Centro (Grátis)</option>
                            <option value="5">Alto Santo Antônio (R$ 5,00)</option>
                            <option value="7">Bonança (R$ 7,00)</option>
                            <option value="10">Zona Rural (R$ 10,00)</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="box-input-animado">
                <label>Referência (Opcional):</label>
                <div class="input-icon"><i class="fa-regular fa-flag"></i><input type="text" id="end-ref" placeholder="Próximo a..."></div>
            </div>
        </div>

        <div class="divisor"></div>

        <h3 class="titulo-secao"><i class="fa-regular fa-credit-card"></i> Pagamento</h3>
        <div class="grupo-opcoes">
            <label class="card-opcao">
                <input type="radio" name="pagamento" value="pix">
                <div class="conteudo-card">
                    <div class="icone-card" style="color:#00bfa5;"><i class="fa-brands fa-pix"></i></div>
                    <div class="texto-card"><strong>Pix</strong><p>Pagamento instantâneo</p></div>
                    <div class="check-icon"><i class="fa-solid fa-circle-check"></i></div>
                </div>
            </label>
            <label class="card-opcao">
                <input type="radio" name="pagamento" value="cartao" checked>
                <div class="conteudo-card">
                    <div class="icone-card" style="color:#2979ff;"><i class="fa-regular fa-credit-card"></i></div>
                    <div class="texto-card"><strong>Cartão</strong><p>Leva a maquineta</p></div>
                    <div class="check-icon"><i class="fa-solid fa-circle-check"></i></div>
                </div>
            </label>
            <label class="card-opcao">
                <input type="radio" name="pagamento" value="dinheiro" onchange="toggleTroco()">
                <div class="conteudo-card">
                    <div class="icone-card" style="color:#4caf50;"><i class="fa-solid fa-money-bill-wave"></i></div>
                    <div class="texto-card"><strong>Dinheiro</strong><p>Pagamento em espécie</p></div>
                    <div class="check-icon"><i class="fa-solid fa-circle-check"></i></div>
                </div>
            </label>
        </div>

        <div id="box-troco" class="box-input-animado" style="display:none;">
            <label>Troco para quanto?</label>
            <div class="input-icon"><i class="fa-solid fa-hand-holding-dollar"></i><input type="tel" id="troco-cliente" placeholder="Ex: 50,00"></div>
        </div>

        <div class="divisor"></div>

        <div style="background:#fff7df; border:1px solid #f0d47a; border-radius:14px; padding:16px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>Subtotal</span><strong id="resumo-subtotal">R$ 0,00</strong></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>Taxa de entrega</span><strong id="resumo-taxa">R$ 0,00</strong></div>
            <div style="display:flex; justify-content:space-between; padding-top:10px; border-top:1px solid rgba(0,0,0,.08); font-size:18px;"><strong>Total</strong><strong id="resumo-total">R$ 0,00</strong></div>
        </div>
    </main>

    <footer class="footer-pagamento">
        <button class="btn-finalizar" onclick="finalizarPedido()">Enviar Pedido via WhatsApp <i class="fa-brands fa-whatsapp"></i></button>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const SEU_NUMERO = "5581991243260";
        const firebaseConfig = {
            apiKey: "AlzaSyBp32ijeLw2LvNwKur5EaUj7B9WZ1G-AW0",
            authDomain: "loucosportapioca-57964.firebaseapp.com",
            projectId: "loucosportapioca-57964",
            storageBucket: "loucosportapioca-57964.firebasestorage.app",
            messagingSenderId: "371332659198",
            appId: "1:371332659198:web:330626357653acc00772af"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function moeda(v){ return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
        function getCarrinho(){ return JSON.parse(localStorage.getItem('carrinho')) || []; }
        function subtotalCarrinho(){ return getCarrinho().reduce((sum,i)=> sum + (Number(i.preco||0) * Number(i.quantidade||1)), 0); }

        document.addEventListener('DOMContentLoaded', () => {
            IMask(document.getElementById('cliente-tel'), { mask: '(00) 00000-0000' });
            calcularTotalComTaxa();
        });

        function toggleEndereco() {
            const tipo = document.querySelector('input[name="entrega"]:checked').value;
            document.getElementById('box-endereco').style.display = (tipo === 'entrega') ? 'block' : 'none';
            calcularTotalComTaxa();
        }
        function toggleTroco() {
            const tipo = document.querySelector('input[name="pagamento"]:checked').value;
            document.getElementById('box-troco').style.display = (tipo === 'dinheiro') ? 'block' : 'none';
        }
        document.querySelectorAll('input[name="pagamento"]').forEach(r => r.addEventListener('change', toggleTroco));

        function calcularTotalComTaxa() {
            const entrega = document.querySelector('input[name="entrega"]:checked').value;
            const subtotal = subtotalCarrinho();
            const taxa = entrega === 'entrega' ? Number(document.getElementById('end-bairro').value || 0) : 0;
            const total = subtotal + taxa;
            document.getElementById('resumo-subtotal').innerText = moeda(subtotal);
            document.getElementById('resumo-taxa').innerText = moeda(taxa);
            document.getElementById('resumo-total').innerText = moeda(total);
            document.getElementById('valor-total-header').innerText = moeda(total);
        }

        async function finalizarPedido() {
            const carrinho = getCarrinho();
            if (!carrinho.length) return alert("Seu carrinho está vazio!");

            const nome = document.getElementById('cliente-nome').value.trim();
            const telefone = document.getElementById('cliente-tel').value.trim();
            const entrega = document.querySelector('input[name="entrega"]:checked').value;
            const pagamento = document.querySelector('input[name="pagamento"]:checked').value;
            const troco = document.getElementById('troco-cliente').value.trim();

            if (!nome) return alert("Por favor, digite seu nome.");
            if (telefone.length < 14) return alert("Digite um telefone válido.");

            let enderecoCompleto = "Retirada no Local";
            let bairro = "";
            let taxaEntrega = 0;

            if (entrega === 'entrega') {
                const rua = document.getElementById('end-rua').value.trim();
                const num = document.getElementById('end-num').value.trim();
                bairro = document.getElementById('end-bairro').selectedOptions[0].text;
                taxaEntrega = Number(document.getElementById('end-bairro').value || 0);
                const ref = document.getElementById('end-ref').value.trim();

                if (!rua || !num || !document.getElementById('end-bairro').value) return alert("Preencha o endereço completo.");
                enderecoCompleto = `${rua}, Nº ${num}, ${bairro}${ref ? ' ('+ref+')' : ''}`;
            }

            const subtotal = subtotalCarrinho();
            const total = subtotal + taxaEntrega;

            const btn = document.querySelector('.btn-finalizar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processando...';

            const pedido = {
                data: new Date(),
                status: 'pendente',
                origem: 'cliente',
                cliente: { nome, telefone },
                entrega: { tipo: entrega, endereco: enderecoCompleto, bairro, taxa: taxaEntrega },
                pagamento: { metodo: pagamento, troco: troco || "" },
                itens: carrinho,
                subtotal,
                total
            };

            try {
                const docRef = await db.collection("pedidos").add(pedido);
                enviarZap(pedido, docRef.id);
            } catch (e) {
                console.error(e);
                alert("Erro ao salvar pedido.");
                btn.disabled = false;
                btn.innerHTML = 'Enviar Pedido via WhatsApp <i class="fa-brands fa-whatsapp"></i>';
            }
        }

        function enviarZap(pedido, idPedido) {
            const idCurto = idPedido.slice(0, 5).toUpperCase();
            let msg = `*PEDIDO #${idCurto}* 🌵
`;
            msg += `👤 ${pedido.cliente.nome}
📞 ${pedido.cliente.telefone}

`;
            pedido.itens.forEach(i => msg += `▪️ ${i.quantidade}x ${i.nome}
`);
            msg += `
💰 *Subtotal:* ${moeda(pedido.subtotal)}
`;
            msg += `🛵 *Taxa:* ${moeda(pedido.entrega.taxa || 0)}
`;
            msg += `💵 *Total:* ${moeda(pedido.total)}
`;
            msg += `--------------------------------
`;
            msg += pedido.entrega.tipo === 'entrega' ? `🏠 *Entrega:*\n${pedido.entrega.endereco}\n` : `👜 *Retirada no Balcão*\n`;
            msg += `💳 *Pagamento:* ${pedido.pagamento.metodo.toUpperCase()}\n`;
            if (pedido.pagamento.troco) msg += `💵 *Troco para:* ${pedido.pagamento.troco}\n`;

            localStorage.removeItem('carrinho');
            window.open(`https://wa.me/${SEU_NUMERO}?text=${encodeURIComponent(msg)}`, '_blank');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
