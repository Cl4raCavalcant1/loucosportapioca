<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        .acoes-sacola-topo { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .titulo-sacola { color: var(--brown-dark); font-size: 22px; font-weight: 800; }
        .btn-limpar-carrinho { background:#ffefef; color:#d32f2f; border:none; padding:12px 16px; border-radius:12px; font-weight:700; cursor:pointer; }
        .resumo-sacola-box { background:#fff8e1; border:1px solid #f0d980; border-radius:16px; padding:16px; margin-top:18px; }
        .linha-sacola-resumo { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; color:#5A3E34; }
        .linha-sacola-resumo.total { margin-bottom:0; padding-top:10px; border-top:1px dashed rgba(90,62,52,.25); font-size:18px; font-weight:800; }
        .btn-prosseguir.desabilitado { pointer-events:none; opacity:.5; }
    </style>
</head>
<body>

    <header class="header-carrinho">
        <a href="index.html" class="btn-voltar">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <span class="titulo-voltar">Voltar</span>
        <div class="info-sacola">
            <span class="texto-sacola">Sua Sacola</span>
            <span class="valor-sacola">R$ 0,00</span>
        </div>
    </header>

    <main class="container-carrinho">
        <div class="acoes-sacola-topo">
            <div class="titulo-sacola">Seu pedido</div>
            <button class="btn-limpar-carrinho" onclick="limparCarrinho()">
                <i class="fa-solid fa-trash-can"></i> Limpar carrinho
            </button>
        </div>

        <div id="lista-carrinho"></div>

        <div class="resumo-sacola-box">
            <div class="linha-sacola-resumo"><span>Itens selecionados</span><strong id="itens-carrinho-resumo">0 item(ns)</strong></div>
            <div class="linha-sacola-resumo"><span>Subtotal</span><strong id="subtotal-carrinho">R$ 0,00</strong></div>
            <div class="linha-sacola-resumo total"><span>Total</span><strong id="total-carrinho">R$ 0,00</strong></div>
        </div>
    </main>

    <footer class="footer-carrinho">
        <a href="pagamento.html" class="btn-prosseguir">
            Prosseguir <i class="fa-solid fa-chevron-right"></i>
        </a>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="script.js"></script>
</body>
</html>
