<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Loucos Por Tapioca</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background-color: var(--bg-primary); padding:20px; }
        .login-box { background:white; padding:40px 30px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1); text-align:center; width:100%; max-width:360px; }
        .login-box h2 { margin-bottom:20px; color: var(--brown-dark); }
        .input-group { margin-bottom:15px; text-align:left; }
        .input-group input { width:100%; padding:12px 15px; border:2px solid #eee; border-radius:10px; font-size:14px; outline:none; }
        .input-group input:focus { border-color: var(--bg-primary); }
        .btn-entrar { background-color: var(--brown-dark); color:white; border:none; padding:15px; width:100%; border-radius:10px; cursor:pointer; font-weight:bold; font-size:16px; margin-top:10px; }
        .btn-entrar:hover { background-color:#4a332a; transform: scale(1.02); }
        .mini-link { display:block; margin-top:14px; color:#5A3E34; text-decoration:none; font-weight:600; }
        .aviso { font-size:12px; color:#777; margin-top:12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div style="margin-bottom:20px;">
            <i class="fa-solid fa-lock" style="font-size:40px; color: var(--brown-dark);"></i>
        </div>
        <h2>Área Restrita</h2>
        <div class="input-group">
            <input type="text" id="usuario" placeholder="Usuário">
        </div>
        <div class="input-group">
            <input type="password" id="senha" placeholder="Senha">
        </div>
        <button class="btn-entrar" onclick="fazerLogin()">Entrar</button>
        <a class="mini-link" href="garcom.html">Ir para Garçom / Mesas</a>
        <div class="aviso">Acesso do admin atualizado.</div>
    </div>

    <script>
        function fazerLogin() {
            const user = document.getElementById('usuario').value.trim();
            const pass = document.getElementById('senha').value.trim();
            if (user === "clara" && pass === "123456") {
                sessionStorage.setItem('logado', 'sim');
                window.location.href = "admin.html";
            } else {
                alert("Usuário ou senha incorretos!");
            }
        }
    </script>
</body>
</html>
