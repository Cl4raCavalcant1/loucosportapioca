<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozinha - Pedidos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background:#f3f4f6; }
    .header { background:#5A3E34; color:#fff; padding:18px; display:flex; justify-content:space-between; align-items:center; gap:12px; position:sticky; top:0; z-index:20; }
    .container { max-width:1200px; margin:0 auto; padding:18px; }
    .filtros { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
    .chip { background:#fff; border:1px solid #ddd; padding:10px 14px; border-radius:999px; cursor:pointer; font-weight:700; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
    .card { background:#fff; border-radius:18px; padding:16px; box-shadow:0 10px 24px rgba(0,0,0,.06); border-left:8px solid #EEB91B; }
    .card.pronto { border-left-color:#00C851; }
    .card.saindo { border-left-color:#2979ff; }
    .card.mesa { border-left-color:#9c27b0; }
    .acoes { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .btn { border:none; border-radius:10px; padding:10px 12px; font-weight:700; cursor:pointer; }
    .btn-pri { background:#EEB91B; color:#5A3E34; }
    .btn-sec { background:#5A3E34; color:#fff; }
    .btn-ok { background:#00C851; color:#fff; }
    .btn-blue { background:#2979ff; color:#fff; }
    .tag { display:inline-block; padding:4px 8px; border-radius:999px; background:#f4f4f4; font-size:12px; font-weight:700; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h2 style="color:#fff;">Pedidos da cozinha</h2>
      <small>Em tempo real</small>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <a href="admin.html" class="btn btn-pri" style="text-decoration:none;">Admin</a>
      <a href="garcom.html" class="btn btn-pri" style="text-decoration:none;">Garçom / Mesas</a>
    </div>
  </div>

  <div class="container">
    <div class="filtros">
      <button class="chip" onclick="setFiltro('todos')">Todos</button>
      <button class="chip" onclick="setFiltro('cliente')">Delivery / retirada</button>
      <button class="chip" onclick="setFiltro('mesa')">Mesas</button>
      <button class="chip" onclick="setFiltro('pendente')">Pendentes</button>
      <button class="chip" onclick="setFiltro('pronto')">Prontos</button>
    </div>
    <div id="lista" class="grid"><p>Carregando pedidos...</p></div>
  </div>

  <audio id="som-notificacao" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AlzaSyBp32ijeLw2LvNwKur5EaUj7B9WZ1G-AW0",
      authDomain: "loucosportapioca-57964.firebaseapp.com",
      projectId: "loucosportapioca-57964",
      storageBucket: "loucosportapioca-57964.firebasestorage.app",
      messagingSenderId: "371332659198",
      appId: "1:371332659198:web:330626357653acc00772af"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let pedidos = [];
    let filtro = 'todos';
    const NUMERO_RESTAURANTE = '5581991243260';

    function money(v){ return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
    function setFiltro(f){ filtro = f; render(); }
    window.setFiltro = setFiltro;

    db.collection("pedidos").orderBy("data", "desc").onSnapshot((snapshot) => {
      snapshot.docChanges().forEach(change => {
        if (change.type === "added" && !change.doc.metadata.fromCache) {
          document.getElementById('som-notificacao').play().catch(()=>{});
        }
      });
      pedidos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      render();
    });

    function passaFiltro(p) {
      if (filtro === 'todos') return true;
      if (filtro === 'cliente') return p.origem !== 'mesa';
      if (filtro === 'mesa') return p.origem === 'mesa';
      if (filtro === 'pendente') return p.status === 'pendente';
      if (filtro === 'pronto') return p.status === 'pronto';
      return true;
    }

    function render() {
      const box = document.getElementById('lista');
      const lista = pedidos.filter(passaFiltro);
      if (!lista.length) { box.innerHTML = '<p>Nenhum pedido encontrado.</p>'; return; }
      box.innerHTML = '';
      lista.forEach(p => {
        const data = p.data && p.data.toDate ? p.data.toDate().toLocaleTimeString('pt-BR',{hour:'2-digit', minute:'2-digit'}) : '';
        const classe = p.origem === 'mesa' ? 'mesa' : (p.status === 'saindo_entrega' ? 'saindo' : (p.status === 'pronto' ? 'pronto' : ''));
        const itens = (p.itens || []).map(i => `<div style="margin-bottom:8px;"><strong>${i.quantidade}x</strong> ${i.nome}${i.observacao ? `<br><small style="opacity:.7;">Obs: ${i.observacao}</small>` : ''}${i.pessoa ? `<br><small style="opacity:.7;">Pessoa: ${i.pessoa}</small>` : ''}</div>`).join('');
        let subtipo = '🛵 Entrega';
        if (p.entrega && p.entrega.tipo === 'retirada') subtipo = '👜 Retirada';
        if (p.entrega && p.entrega.tipo === 'mesa') subtipo = `🍽️ Mesa ${p.mesaNumero || ''}`;

        let acoes = '';
        if (p.origem === 'mesa') {
          acoes += p.status === 'pendente'
            ? `<button class="btn btn-ok" onclick="mudarStatus('${p.id}','pronto')">Pronto</button>`
            : `<button class="btn btn-sec" onclick="mudarStatus('${p.id}','entregue_mesa')">Entregue na mesa</button>`;
        } else {
          acoes += p.status === 'pendente'
            ? `<button class="btn btn-ok" onclick="mudarStatus('${p.id}','pronto')">Pronto</button>`
            : '';
          if (p.entrega && p.entrega.tipo === 'entrega') {
            acoes += `<button class="btn btn-blue" onclick="avisarSaindoEntrega('${p.id}')">Saiu para entrega</button>`;
          }
          if (p.entrega && p.entrega.tipo === 'retirada') {
            acoes += `<button class="btn btn-blue" onclick="avisarRetirada('${p.id}')">Avisar retirada</button>`;
          }
        }
        acoes += `<button class="btn btn-pri" onclick="imprimirResumo('${p.id}')">Imprimir</button>`;
        acoes += `<button class="btn btn-sec" onclick="arquivar('${p.id}')">Arquivar</button>`;

        box.innerHTML += `
          <div class="card ${classe}" id="pedido-${p.id}">
            <div style="display:flex; justify-content:space-between; gap:10px; margin-bottom:10px;">
              <strong>#${p.id.slice(0,5).toUpperCase()}</strong>
              <span>${data}</span>
            </div>
            <div style="display:flex; justify-content:space-between; gap:10px; align-items:flex-start; margin-bottom:10px;">
              <div>
                <strong>${p.cliente?.nome || 'Cliente'}</strong><br>
                <small>${subtipo}</small><br>
                ${p.garcom ? `<small>Garçom: ${p.garcom}</small><br>` : ''}
                ${p.cliente?.telefone ? `<small>Tel: ${p.cliente.telefone}</small>` : ''}
              </div>
              <span class="tag">${p.status || 'pendente'}</span>
            </div>
            <div style="border-top:1px solid #eee; border-bottom:1px solid #eee; padding:10px 0;">${itens}</div>
            <div style="display:flex; justify-content:space-between; margin-top:10px;">
              <span>Total</span><strong>${money(p.total || 0)}</strong>
            </div>
            <div class="acoes">${acoes}</div>
          </div>`;
      });
    }

    async function mudarStatus(id, status) {
      await db.collection('pedidos').doc(id).update({ status });
      render();
    }
    window.mudarStatus = mudarStatus;

    async function avisarSaindoEntrega(id) {
      const doc = await db.collection('pedidos').doc(id).get();
      if (!doc.exists) return;
      const p = doc.data();
      await db.collection('pedidos').doc(id).update({ status: 'saindo_entrega' });
      const msg = `Olá, ${p.cliente?.nome || ''}! Seu pedido #${id.slice(0,5).toUpperCase()} saiu para rota de entrega e em breve chegará até você.`;
      const fone = String(p.cliente?.telefone || '').replace(/\D/g,'');
      if (fone) window.open(`https://wa.me/55${fone.length===11?fone:fone}?text=${encodeURIComponent(msg)}`,'_blank');
    }
    window.avisarSaindoEntrega = avisarSaindoEntrega;

    async function avisarRetirada(id) {
      const doc = await db.collection('pedidos').doc(id).get();
      if (!doc.exists) return;
      const p = doc.data();
      await db.collection('pedidos').doc(id).update({ status: 'pronto_retirada' });
      const msg = `Olá, ${p.cliente?.nome || ''}! Seu pedido #${id.slice(0,5).toUpperCase()} já está pronto para retirada.`;
      const fone = String(p.cliente?.telefone || '').replace(/\D/g,'');
      if (fone) window.open(`https://wa.me/55${fone.length===11?fone:fone}?text=${encodeURIComponent(msg)}`,'_blank');
    }
    window.avisarRetirada = avisarRetirada;

    async function arquivar(id) {
      if (!confirm('Arquivar este pedido?')) return;
      await db.collection('pedidos').doc(id).delete();
    }
    window.arquivar = arquivar;

    async function imprimirResumo(id) {
      const doc = await db.collection('pedidos').doc(id).get();
      if (!doc.exists) return;
      const p = doc.data();
      const win = window.open('', '_blank', 'width=400,height=700');
      win.document.write(`
        <html><head><title>Pedido</title></head><body style="font-family:Arial;padding:16px;">
        <h2>Pedido #${id.slice(0,5).toUpperCase()}</h2>
        <p><strong>Cliente:</strong> ${p.cliente?.nome || ''}</p>
        <p><strong>Origem:</strong> ${p.origem === 'mesa' ? 'Mesa ' + (p.mesaNumero || '') : (p.entrega?.tipo || '')}</p>
        ${(p.itens || []).map(i => `<div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:8px;"><span>${i.quantidade}x ${i.nome}${i.observacao ? ' - ' + i.observacao : ''}</span><strong>${money((i.preco||0) * (i.quantidade||1))}</strong></div>`).join('')}
        <hr><h3>Total: ${money(p.total || 0)}</h3>
        </body></html>`);
      win.document.close();
      win.print();
    }
    window.imprimirResumo = imprimirResumo;
  </script>
</body>
</html>
